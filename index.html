<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Ninurta‑Full · Mine & Transfer</title>
    <style>
        body {
            background: #0a0f1e;
            font-family: system-ui;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: #111827cc;
            border-radius: 48px;
            padding: 24px;
            border: 1px solid #2d3a5e;
        }
        h1, h2 { text-align: center; color: white; margin: 0 0 8px; }
        .tabs {
            display: flex;
            gap: 8px;
            margin: 16px 0;
        }
        .tab-btn {
            flex: 1;
            background: #1e2a3e;
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .tab-btn.active { background: #3b6ea0; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .balance {
            background: #00000066;
            border-radius: 32px;
            padding: 16px;
            text-align: center;
            margin: 16px 0;
        }
        .balance .amount { font-size: 2rem; font-weight: bold; color: #ffdd99; }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
        }
        input, select { background: #010a1a; border: 1px solid #2f4172; color: #ffdd99; }
        button { background: #3b6ea0; color: white; font-weight: bold; cursor: pointer; }
        .mining-stats { background: #00000044; border-radius: 28px; padding: 12px; margin: 16px 0; text-align: center; }
        .footer { font-size: 0.65rem; text-align: center; color: #5b6b8e; margin-top: 20px; }
        #status { color: #88aaff; text-align: center; margin-top: 12px; }
    </style>
</head>
<body>
<div class="card">
    <h1>⚡ NINURTA‑FULL</h1>
    <div class="balance">
        <div class="amount" id="balance">1,250.00</div>
        <div id="balanceCurrency">USD</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="send">📤 Send</button>
        <button class="tab-btn" data-tab="receive">📥 Receive</button>
        <button class="tab-btn" data-tab="crypto">₿ Crypto</button>
        <button class="tab-btn" data-tab="mining">⛏️ Mining</button>
    </div>

    <!-- Send Tab -->
    <div id="sendPane" class="tab-pane active">
        <select id="currency">
            <option value="USD">💵 USD</option><option value="EUR">💶 EUR</option>
            <option value="CNY">💴 CNY</option><option value="THB">฿ THB</option>
            <option value="BDT">৳ BDT</option><option value="INR">₹ INR</option>
        </select>
        <input type="text" id="recipient" placeholder="Recipient ID / Phone / Email">
        <input type="number" id="amount" placeholder="Amount">
        <button id="sendBtn">✈️ Send Payment</button>
        <div id="sendStatus"></div>
    </div>

    <!-- Receive Tab -->
    <div id="receivePane" class="tab-pane">
        <div style="text-align:center; padding:20px;">
            <div style="font-size:1.2rem;">Your CSFS ID</div>
            <div style="background:#010a1a; padding:12px; border-radius:40px; margin:12px 0;">ninurta@csfs.net</div>
            <button id="copyIdBtn">📋 Copy ID</button>
        </div>
    </div>

    <!-- Crypto Tab -->
    <div id="cryptoPane" class="tab-pane">
        <select id="cryptoType">
            <option value="BTC">Bitcoin (BTC)</option>
            <option value="ETH">Ethereum (ETH)</option>
            <option value="CSFS">CSFS Coin</option>
        </select>
        <input type="text" id="cryptoAddress" placeholder="Recipient wallet address">
        <input type="number" id="cryptoAmount" placeholder="Amount">
        <button id="cryptoSendBtn">₿ Send Crypto</button>
        <div id="cryptoStatus"></div>
    </div>

    <!-- Mining Tab -->
    <div id="miningPane" class="tab-pane">
        <div class="mining-stats">
            <div>⛏️ Hashrate: <strong id="hashrate">0</strong> slices/min</div>
            <div>💰 Mined today: <strong id="minedToday">0.0000</strong> CSFS</div>
        </div>
        <button id="startMiningBtn">▶️ Start Mining</button>
        <button id="stopMiningBtn" style="background:#6b8cae;">⏹️ Stop</button>
        <div id="miningHistory" style="margin-top:16px; font-size:0.7rem; background:#00000044; border-radius:28px; padding:12px; max-height:150px; overflow-y:auto;"></div>
    </div>

    <div class="footer">🔐 PIN protected · Multi‑currency · Mine CSFS · No SWIFT</div>
</div>

<script>
    // ========== DATA ==========
    let balanceUSD = 1250;
    let currentCurrency = 'USD';
    const rates = { USD:1, EUR:0.92, CNY:7.22, THB:36.5, BDT:109.5, INR:83.2 };
    let miningInterval = null;
    let hashrate = 0;
    let minedToday = 0;

    // ========== DOM ELEMENTS ==========
    const balanceEl = document.getElementById('balance');
    const sendStatus = document.getElementById('sendStatus');
    const cryptoStatus = document.getElementById('cryptoStatus');
    const miningHistory = document.getElementById('miningHistory');
    const hashrateEl = document.getElementById('hashrate');
    const minedTodayEl = document.getElementById('minedToday');

    function updateBalanceDisplay() {
        const converted = (balanceUSD * rates[currentCurrency]).toFixed(2);
        balanceEl.innerText = converted;
    }

    // ========== TABS ==========
    const btns = document.querySelectorAll('.tab-btn');
    const panes = {
        send: document.getElementById('sendPane'),
        receive: document.getElementById('receivePane'),
        crypto: document.getElementById('cryptoPane'),
        mining: document.getElementById('miningPane')
    };
    btns.forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.getAttribute('data-tab');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            Object.values(panes).forEach(p => p.classList.remove('active'));
            if (panes[tab]) panes[tab].classList.add('active');
        });
    });

    // ========== SEND ==========
    document.getElementById('sendBtn').addEventListener('click', () => {
        const recipient = document.getElementById('recipient').value;
        let amount = parseFloat(document.getElementById('amount').value);
        if (!recipient || isNaN(amount)) { sendStatus.innerText = '❌ Enter recipient and amount'; return; }
        const amountUSD = amount / rates[currentCurrency];
        if (amountUSD > balanceUSD) { sendStatus.innerText = '❌ Insufficient balance'; return; }
        balanceUSD -= amountUSD;
        updateBalanceDisplay();
        sendStatus.innerText = `✅ Sent ${amount} ${currentCurrency} to ${recipient}`;
        setTimeout(() => sendStatus.innerText = '', 3000);
        document.getElementById('amount').value = '';
        document.getElementById('recipient').value = '';
    });

    // ========== RECEIVE ==========
    document.getElementById('copyIdBtn')?.addEventListener('click', () => {
        navigator.clipboard.writeText('ninurta@csfs.net');
        alert('CSFS ID copied');
    });

    // ========== CRYPTO ==========
    document.getElementById('cryptoSendBtn').addEventListener('click', () => {
        const type = document.getElementById('cryptoType').value;
        const addr = document.getElementById('cryptoAddress').value;
        const amount = parseFloat(document.getElementById('cryptoAmount').value);
        if (!addr || isNaN(amount)) { cryptoStatus.innerText = '❌ Enter address and amount'; return; }
        if (amount > balanceUSD) { cryptoStatus.innerText = '❌ Insufficient balance'; return; }
        balanceUSD -= amount;
        updateBalanceDisplay();
        cryptoStatus.innerText = `✅ Sent ${amount} ${type} to ${addr.substring(0,8)}...`;
        setTimeout(() => cryptoStatus.innerText = '', 3000);
        document.getElementById('cryptoAddress').value = '';
        document.getElementById('cryptoAmount').value = '';
    });

    // ========== MINING ==========
    function addMiningEntry(text) {
        const entry = document.createElement('div');
        entry.innerText = text;
        miningHistory.insertBefore(entry, miningHistory.firstChild);
        if (miningHistory.children.length > 20) miningHistory.removeChild(miningHistory.lastChild);
    }

    function mineSlice() {
        const coherence = Math.random();
        if (coherence > 0.7) {
            const reward = coherence * 0.005;
            minedToday += reward;
            balanceUSD += reward;
            updateBalanceDisplay();
            addMiningEntry(`⛏️ Mined ${reward.toFixed(4)} CSFS (coherence ${coherence.toFixed(2)})`);
            minedTodayEl.innerText = minedToday.toFixed(4);
        }
        hashrate = Math.min(15, hashrate * 0.95 + (Math.random() * 0.5));
        hashrateEl.innerText = hashrate.toFixed(2);
    }

    document.getElementById('startMiningBtn').addEventListener('click', () => {
        if (miningInterval) clearInterval(miningInterval);
        miningInterval = setInterval(mineSlice, 5000);
        addMiningEntry('▶️ Mining started');
    });
    document.getElementById('stopMiningBtn').addEventListener('click', () => {
        if (miningInterval) { clearInterval(miningInterval); miningInterval = null; }
        addMiningEntry('⏹️ Mining stopped');
    });

    // ========== CURRENCY ==========
    document.getElementById('currency').addEventListener('change', (e) => {
        currentCurrency = e.target.value;
        updateBalanceDisplay();
    });

    updateBalanceDisplay();
</script>
</body>
</html>
